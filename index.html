                    <div className="text-2xl font-bold text-gray-900">{d.pricingData.aud.amount}</div>
                    {d.pricingData.aud.period && <div className="text-sm text-gray-600 mt-1">{d.pricingData.aud.period}</div>}
                    {d.pricingData.aud.note    && <div className="text-xs text-orange-600 mt-2">⚠️ {d.pricingData.aud.note}</div>}
                    {d.pricingData.aud.verified && <div className="text-xs text-green-600 mt-2">✅ Verified</div>}
                  </div>
                  <div className="border border-blue-200 rounded-lg p-4 bg-blue-50">
                    <div className="text-sm text-gray-500 mb-1">USD (Reference)</div>
                    <div className="text-2xl font-bold text-gray-900">{d.pricingData.usd.monthly}</div>
                    <div className="text-sm text-gray-600 mt-1">{d.pricingData.usd.includes}</div>
                    {d.pricingData.usd.monthly !== 'Contact sales' && d.pricingData.usd.monthly !== 'Free Trial'
                      ? <div className="text-xs text-green-600 mt-2">✅ Verified</div>
                      : <div className="text-xs text-orange-600 mt-2">⚠️ Estimate only</div>}
                  </div>
                </div>
                <div className="border border-gray-200 rounded-lg p-4">
                  <h3 className="font-semibold mb-3">Pricing Structure</h3>
                  <div className="grid grid-cols-2 gap-4 text-sm">
                    <div><span className="text-gray-600">Billing Model:</span><span className="ml-2 font-medium">{d.billingModel}</span></div>
                    <div><span className="text-gray-600">Annual Discount:</span><span className="ml-2 font-medium text-green-600">{d.annualDiscount}</span></div>
                    <div><span className="text-gray-600">Starter Includes:</span><span className="ml-2 font-medium">{d.starterIncludes}</span></div>
                    <div>
                      <div className="flex items-center gap-1">
                        <Tooltip term="overage"><span className="text-gray-600">If You Exceed Limit:</span></Tooltip>
                      </div>
                      <span className="ml-2 font-medium text-red-600">{d.overage}</span>
                      <div className="text-xs text-gray-500 mt-1">{d.overageNote}</div>
                    </div>
                  </div>
                </div>
                <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-4">
                  <div className="flex items-center gap-1 mb-2">
                    <Tooltip term="credits"><h4 className="font-semibold text-yellow-900">Additional Costs</h4></Tooltip>
                  </div>
                  <ul className="text-sm text-yellow-800 space-y-1">
                    {d.additionalCosts.map((c, i) => <li key={i}>• {c}</li>)}
                  </ul>
                </div>
                <div className="border-l-4 border-blue-600 bg-blue-50 p-4">
                  <div className="text-sm text-blue-900"><strong>Sales Note:</strong> {d.salesNote}</div>
                </div>
              </div>
            )}

            {/* FEATURES */}
            {activeTab === 'features' && (
              <div className="space-y-6">
                <div>
                  <h3 className="font-semibold text-gray-900 mb-4">Features Available</h3>
                  <div className="grid grid-cols-3 gap-4 px-3 pb-2 mb-2 border-b-2 border-gray-300">
                    <div className="font-semibold text-gray-700">Feature</div>
                    <div className="font-semibold text-gray-700">Details</div>
                    <div className="font-semibold text-gray-700">Data Confidence</div>
                  </div>
                  <div className="space-y-3">
                    {d.hasFeature.map((feature, i) => (
                      <div key={i} className="grid grid-cols-3 gap-4 items-center p-3 bg-gray-50 rounded-lg">
                        <div className="flex items-center gap-2">
                          <CheckCircle className="text-green-600 flex-shrink-0" size={18} />
                          {feature.tooltip
                            ? <Tooltip term={feature.tooltip}><div className="font-medium text-gray-900">{feature.name}</div></Tooltip>
                            : <div className="font-medium text-gray-900">{feature.name}</div>}
                        </div>
                        <div className="text-sm text-gray-600">{feature.detail}</div>
                        <div>{getConfidenceBadge(feature.confidence)}</div>
                      </div>
                    ))}
                  </div>
                </div>
                <div>
                  <h3 className="font-semibold text-gray-900 mb-4">Features NOT Available (vs Lightyear)</h3>
                  <div className="space-y-2">
                    {d.missing.map((feature, i) => (
                      <div key={i} className="flex items-center gap-3 p-3 bg-red-50 rounded-lg">
                        <XCircle className="text-red-600 flex-shrink-0" size={18} />
                        {feature.tooltip
                          ? <Tooltip term={feature.tooltip}><span className="text-gray-900">{feature.name}</span></Tooltip>
                          : <span className="text-gray-900">{feature.name}</span>}
                      </div>
                    ))}
                  </div>
                </div>
                <div className="bg-white border border-gray-200 rounded-lg p-4">
                  <h3 className="font-semibold mb-3">Software Integrations</h3>
                  <div className="space-y-4">
                    <div>
                      <div className="text-sm text-gray-600 mb-2">Accounting Software (Top 5)</div>
                      <div className="flex flex-wrap gap-2">
                        {d.accounting.slice(0, 5).map((int, i) => (
                          <div key={i} className="bg-blue-50 border border-blue-200 rounded px-3 py-1.5 text-sm">
                            <span className="font-medium">{int.name}</span>
                            {int.rating && <span className="text-blue-600 ml-2">{int.rating}</span>}
                            {int.note   && <span className="text-gray-500 ml-1 text-xs">({int.note})</span>}
                          </div>
                        ))}
                      </div>
                    </div>
                    {d.ecommerce.length > 0 && (
                      <div>
                        <div className="text-sm text-gray-600 mb-2">E-commerce Platforms</div>
                        <div className="flex flex-wrap gap-2">
                          {d.ecommerce.map((name, i) => <span key={i} className="bg-gray-100 rounded px-2 py-1 text-sm">{name}</span>)}
                        </div>
                      </div>
                    )}
                    <div className="pt-2 border-t">
                      <span className="text-sm font-medium text-gray-900">Banking Connections: </span>
                      <span className="text-sm text-green-600">{d.banking}</span>
                    </div>
                    <div className="pt-2 border-t">
                      <div className="flex items-center gap-1">
                        <Tooltip term="api"><span className="text-sm font-medium text-gray-900">API Access:</span></Tooltip>
                        <span className={`text-sm ml-2 ${d.api === 'No public API' ? 'text-red-600' : 'text-green-600'}`}>{d.api}</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* VS LIGHTYEAR */}
            {activeTab === 'vs-lightyear' && (
              <div className="space-y-6">
                <div className="bg-gradient-to-r from-blue-50 to-green-50 p-6 rounded-lg">
                  <h3 className="text-xl font-bold text-gray-900 mb-2">Head-to-Head Analysis</h3>
                  <p className="text-gray-700">Direct feature comparison to inform sales positioning</p>
                </div>
                <div className="grid grid-cols-4 gap-4 px-4 pb-2 border-b-2 border-gray-300">
                  <div className="font-semibold text-gray-700">Feature</div>
                  <div className="text-center font-semibold text-blue-700">{d.name}</div>
                  <div className="text-center font-semibold text-green-700">Lightyear</div>
                  <div className="text-center font-semibold text-gray-700">Winner</div>
                </div>
                <div className="space-y-2">
                  {d.vsLightyear.map((item, i) => (
                    <div key={i} className="grid grid-cols-4 gap-4 p-4 bg-white border border-gray-200 rounded-lg hover:shadow-md transition-shadow">
                      <div className="font-medium text-gray-900 flex items-center gap-1">
                        {item.tooltip
                          ? <Tooltip term={item.tooltip}><span>{item.metric}</span></Tooltip>
                          : <span>{item.metric}</span>}
                      </div>
                      <div className={`text-center ${item.winner === 'comp' ? 'bg-blue-50 font-semibold text-blue-900' : 'text-gray-600'} rounded px-2 py-1`}>
                        {item.comp}
                      </div>
                      <div className={`text-center ${item.winner === 'lightyear' ? 'bg-green-50 font-semibold text-green-900' : 'text-gray-600'} rounded px-2 py-1`}>
                        {item.lightyear}
                      </div>
                      <div className="text-center">
                        {item.winner === 'comp'      && <span className="text-blue-600 font-medium">{d.name}</span>}
                        {item.winner === 'lightyear' && <span className="text-green-600 font-medium">Lightyear</span>}
                        {item.winner === 'tie'       && <span className="text-gray-500">Tie</span>}
                      </div>
                    </div>
                  ))}
                </div>
                <div className="grid grid-cols-2 gap-6 mt-6">
                  <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
                    <h4 className="font-semibold text-blue-900 mb-3">When {d.name} Wins</h4>
                    <ul className="text-sm text-blue-800 space-y-2">
                      {d.compWins.map((w, i) => <li key={i}>• {w}</li>)}
                    </ul>
                  </div>
                  <div className="bg-green-50 border border-green-200 rounded-lg p-4">
                    <h4 className="font-semibold text-green-900 mb-3">When Lightyear Wins</h4>
                    <ul className="text-sm text-green-800 space-y-2">
                      {d.lyWins.map((w, i) => <li key={i}>• {w}</li>)}
                    </ul>
                  </div>
                </div>
                <div className="bg-purple-50 border border-purple-200 rounded-lg p-5">
                  <h4 className="font-semibold text-purple-900 mb-3">🎯 Sales Positioning Scripts</h4>
                  <div className="space-y-3 text-sm text-purple-900">
                    {d.scripts.map((s, i) => (
                      <div key={i}><strong>{s.title}:</strong> "{s.body}"</div>
                    ))}
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>

        {/* Data Quality */}
        <div className="bg-white rounded-lg shadow p-4">
          <div className="flex items-center justify-between">
            <div>
              <h3 className="font-semibold text-gray-900">Data Quality Summary</h3>
              <p className="text-sm text-gray-600">{d.dqNote}</p>
            </div>
            <div className="flex gap-2">
              <span className="px-3 py-1 bg-green-100 text-green-700 rounded text-sm">✅ High: {d.dqHigh} items</span>
              <span className="px-3 py-1 bg-yellow-100 text-yellow-700 rounded text-sm">⚠️ Medium: {d.dqMed} items</span>
              <span className="px-3 py-1 bg-red-100 text-red-700 rounded text-sm">— Gaps: {d.dqGaps} items</span>
            </div>
          </div>
        </div>

      </div>
    </div>
  );
};

ReactDOM.render(<Dashboard />, document.getElementById('root'));
</script>
</body>
</html>
