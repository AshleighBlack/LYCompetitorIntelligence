const InfoTooltip = ({ term }) => {
  const [show, setShow] = useState(false);
  if (!TOOLTIPS[term]) return null;
  return (
    <span className="relative inline-flex items-center ml-1" style={{verticalAlign:'middle'}}>
      <span
        onMouseEnter={() => setShow(true)}
        onMouseLeave={() => setShow(false)}
        className="cursor-help text-gray-400 hover:text-blue-500 text-xs"
        style={{fontSize:'13px'}}
      >ℹ</span>
      {show && <span className="tooltip-box">{TOOLTIPS[term]}</span>}
    </span>
  );
};

const ConfBadge = ({ level, source }) => {
  const map = { high: ['confidence-high', '✅ HIGH'], medium: ['confidence-medium', '⚠️ MEDIUM'], low: ['confidence-low', '🔶 LOW'], gap: ['confidence-gap', '❌ GAP'] };
  const [cls, label] = map[level] || map.gap;
  return (
    <span className={`px-2 py-0.5 rounded text-xs font-medium ${cls} whitespace-nowrap`}>{label}</span>
  );
};
