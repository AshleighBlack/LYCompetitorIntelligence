  const flagInRange=(f)=>{if(!dateFrom&&!dateTo)return true;const fd=parseDate(f.date);if(!fd)return false;if(dateFrom&&fd<new Date(dateFrom))return false;if(dateTo&&fd>new Date(dateTo+'T23:59:59'))return false;return true;};

        <div className="section-title">Software integrations</div>
        <div style={{fontSize:11,color:'#6b7280',marginBottom:6}}>Accounting software</div>
        <div style={{marginBottom:10}}>{d.accounting.map((a,i)=><span key={i} className="int-chip">{a.name}{a.rating&&<span className="rating">{a.rating}</span>}</span>)}</div>
        {d.ecommerce.length>0&&<><div style={{fontSize:11,color:'#6b7280',marginBottom:6}}>E-commerce / purchasing</div><div style={{marginBottom:10}}>{d.ecommerce.map((e,i)=><span key={i} className="eco-chip">{e}</span>)}</div></>}
        <div style={{fontSize:12,marginBottom:4}}><span style={{fontWeight:500}}>Banking / payments:</span> <span style={{color:'#16a34a'}}>{d.banking}</span></div>
        <div style={{fontSize:12}}><Tooltip term="api">API access:</Tooltip> <span style={{color:d.api==='No public API'?'#dc2626':'#16a34a'}}>{d.api}</span></div>
      </div>
    </div>
  );

  const renderVs=()=>(
    <div>
      <div style={{background:'linear-gradient(to right,#eff6ff,#f0fdf4)',borderRadius:8,padding:14,marginBottom:14}}><div style={{fontSize:15,fontWeight:500,color:'#111827',marginBottom:4}}>Head-to-head analysis</div><div style={{fontSize:12,color:'#6b7280'}}>Direct feature comparison to inform sales positioning</div></div>
      <div className="vs-hdr"><div>Feature</div><div style={{textAlign:'center',color:'#1e40af'}}>{d.name}</div><div style={{textAlign:'center',color:'#166534'}}>Lightyear</div><div style={{textAlign:'center'}}>Winner</div></div>
      {d.vsLightyear.map((r,i)=>(
        <div key={i} className="vs-row">
          <div>{r.tooltip?<Tooltip term={r.tooltip}>{r.metric}</Tooltip>:r.metric}</div>
          <div className={`vs-comp${r.winner==='comp'?' win-comp':''}`}>{r.comp}</div>
          <div className={`vs-ly${r.winner==='lightyear'?' win-ly':''}`}>{r.ly}</div>
          <div style={{textAlign:'center',fontSize:12,fontWeight:500}}>{r.winner==='comp'?<span style={{color:'#1e40af'}}>{d.name}</span>:r.winner==='lightyear'?<span style={{color:'#166534'}}>Lightyear</span>:<span style={{color:'#6b7280'}}>Tie</span>}</div>
        </div>
      ))}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginTop:14}}>
        <div style={{background:'#eff6ff',border:'0.5px solid #bfdbfe',borderRadius:8,padding:12}}><div style={{fontSize:13,fontWeight:500,color:'#1e3a8a',marginBottom:8}}>When {d.name} wins</div>{d.compWins.map((w,i)=><div key={i} style={{fontSize:12,color:'#1e40af',marginBottom:4}}>• {w}</div>)}</div>
        <div style={{background:'#f0fdf4',border:'0.5px solid #bbf7d0',borderRadius:8,padding:12}}><div style={{fontSize:13,fontWeight:500,color:'#14532d',marginBottom:8}}>When Lightyear wins</div>{d.lyWins.map((w,i)=><div key={i} style={{fontSize:12,color:'#166534',marginBottom:4}}>• {w}</div>)}</div>
      </div>
      <div style={{background:'#faf5ff',border:'0.5px solid #e9d5ff',borderRadius:8,padding:12,marginTop:12}}>
        <div style={{fontSize:13,fontWeight:500,color:'#581c87',marginBottom:8}}>Sales positioning scripts</div>
        {d.scripts.map((s,i)=><div key={i} className="script-box"><span style={{fontWeight:500,color:'#111827'}}>{s.title}:</span> <span style={{color:'#6b7280'}}>"{s.body}"</span></div>)}
      </div>
    </div>
  );

  return(
    <div className="dash">
      <div className="page-header">
        <div><div className="page-title">Lightyear competitor intelligence</div><div className="page-sub">Last updated: 6 April 2026</div></div>
        <div style={{textAlign:'right'}}><div style={{fontSize:11,color:'#6b7280'}}>Next update</div><div style={{fontWeight:500,color:'#111827',fontSize:13}}>13 Apr 2026</div></div>
      </div>
      {renderChanges()}
      <div className="card"><div className="tab-bar">{Object.keys(DATA).map(k=><button key={k} className={`tab${k===activeComp?' active':''}`} onClick={()=>{setActiveComp(k);setActiveTab('overview');}}>{DATA[k].name}</button>)}</div></div>
      <div className="card">
        <div className="tab-bar">{['overview','pricing','features','vs-lightyear'].map(t=><button key={t} className={`tab${t===activeTab?' active':''}`} onClick={()=>setActiveTab(t)}>{t.split('-').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ')}</button>)}</div>
        <div className="section-content">{activeTab==='overview'?renderOverview():activeTab==='pricing'?renderPricing():activeTab==='features'?renderFeatures():renderVs()}</div>
      </div>
      <div className="card"><div className="dq-bar">
        <div><div style={{fontSize:13,fontWeight:500,color:'#111827'}}>Data quality summary</div><div className="dq-note">{d.dqNote}</div></div>
        <div className="dq-badges">
          <span className="badge badge-high">✅ High: {d.dqHigh}</span>
          <span className="badge" style={{background:'#fefce8',color:'#854d0e',borderColor:'#fde047'}}>⚠️ Medium: {d.dqMed}</span>
          <span className="badge" style={{background:'#fef2f2',color:'#991b1b',borderColor:'#fca5a5'}}>— Gaps: {d.dqGaps}</span>
        </div>
      </div></div>
    </div>
  );
};

ReactDOM.render(<Dashboard/>,document.getElementById('root'));
</script>
</body>
</html>
